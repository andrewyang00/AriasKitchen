<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aria Kitchen" />
  <meta name="theme-color" content="#f75f9a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>Aria's Kitchen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <button class="round-nav round-nav--home" type="button" aria-label="Go home">
      <span aria-hidden="true">Home</span>
    </button>
    <button class="round-nav round-nav--sound" type="button" aria-label="Sound effects">
      <span aria-hidden="true">Music</span>
    </button>

    <section class="screen screen--start" data-screen="START">
      <div class="start-card">
        <div class="aria-portrait aria-portrait--hero" id="ariaStart"></div>
        <div class="start-copy">
          <p class="eyebrow">Little Chef</p>
          <h1><span data-char-name>Aria</span>'s Kitchen</h1>
          <p class="subtitle">Cooking time!</p>
          <button class="big-button pulse" id="startButton" type="button" aria-label="Start the game">
            <span aria-hidden="true">Play</span>
          </button>
        </div>
      </div>
    </section>

    <section class="screen screen--select" data-screen="SELECT">
      <div class="select-board">
        <div class="select-hero">
          <div class="aria-portrait aria-portrait--select" id="ariaSelect"></div>
          <div>
            <p class="eyebrow">Choose a recipe</p>
            <h2>What should <span data-char-name>Aria</span> make?</h2>
          </div>
        </div>
        <div class="recipe-grid" id="recipeGrid"></div>
      </div>
    </section>

    <section class="screen recipe-step" data-screen="STEP">
      <div class="game-card">
        <header class="step-header">
          <div class="step-badge" id="stepBadge"></div>
          <div>
            <p class="eyebrow" id="stepEyebrow"></p>
            <h2 id="stepTitle"></h2>
          </div>
          <div class="step-pips" id="stepPips" aria-hidden="true"></div>
        </header>
        <div class="step-stage" id="stepStage"></div>
        <footer class="action-strip" id="stepActionStrip">
          <div class="asset" id="stepIndicator"></div>
          <span id="stepHint"></span>
          <div class="progress-dots" id="stepDots" aria-hidden="true"></div>
        </footer>
      </div>
    </section>
  </div>

  <script src="characters.js"></script>
  <script src="recipes.js"></script>
  <script src="assets.js"></script>
  <script src="audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
