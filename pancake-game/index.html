<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aria Pancakes" />
  <meta name="theme-color" content="#ff8fb1" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>Little Chef Aria: Pancakes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    The whole game lives inside #app as a stack of <section class="screen">
    elements. app.js shows exactly one at a time and drives a small state
    machine: START -> SELECT -> EGGS -> MILK -> STIR -> BATTER -> FLIP ->
    CELEBRATE -> (play again) -> SELECT.

    There is no text the child must read to understand what to do — every
    instruction is communicated with big icons/emoji, motion, color and
    sound. Labels exist mainly for screen-reader users and for the grown-up
    setting the game up.
  -->
  <div id="app">

    <!-- ============================= START ============================= -->
    <section class="screen" data-screen="START">
      <div class="start-card">
        <div class="aria-portrait" id="ariaStart"><!-- ariaHappy asset injected by app.js --></div>
        <h1 class="title">
          <span class="title-line">Little Chef</span>
          <span class="title-line title-name">Aria</span>
        </h1>
        <div class="title-pancake" aria-hidden="true">🥞</div>
        <button class="big-button pulse" id="startButton" type="button" aria-label="Start the game">
          <span class="big-button-icon" aria-hidden="true">▶️</span>
        </button>
      </div>
    </section>

    <!-- ============================ SELECT ============================= -->
    <section class="screen" data-screen="SELECT">
      <div class="screen-header">
        <div class="aria-portrait aria-portrait--small" id="ariaSelect"></div>
        <div class="prompt-bubble">
          <span class="prompt-icon" aria-hidden="true">🥞</span>
          <span class="prompt-icon prompt-icon--arrow" aria-hidden="true">👉</span>
        </div>
      </div>
      <div class="recipe-grid">
        <button class="recipe-card recipe-card--active" id="recipePancakes" type="button" aria-label="Make pancakes">
          <span class="recipe-emoji" aria-hidden="true">🥞</span>
          <span class="recipe-glow" aria-hidden="true"></span>
        </button>
        <button class="recipe-card recipe-card--locked" data-locked="true" type="button" aria-label="More recipes coming soon">
          <span class="recipe-emoji" aria-hidden="true">🍪</span>
          <span class="recipe-lock" aria-hidden="true">✨</span>
        </button>
        <button class="recipe-card recipe-card--locked" data-locked="true" type="button" aria-label="More recipes coming soon">
          <span class="recipe-emoji" aria-hidden="true">🍲</span>
          <span class="recipe-lock" aria-hidden="true">✨</span>
        </button>
      </div>
    </section>

    <!-- ============================= EGGS ============================== -->
    <section class="screen" data-screen="EGGS">
      <div class="prompt-bubble">
        <span class="prompt-icon" aria-hidden="true">🥚</span>
        <span class="prompt-icon" aria-hidden="true">🥚</span>
        <span class="prompt-icon prompt-icon--tap" aria-hidden="true">👆</span>
      </div>
      <div class="stage stage--eggs">
        <div class="aria-portrait aria-portrait--stage" id="ariaEggs"></div>
        <div class="egg-row" id="eggRow"><!-- egg targets injected by app.js --></div>
        <div class="bowl-wrap grounded-shadow">
          <div class="bowl-slot" id="bowlEggsSlot"></div>
        </div>
      </div>
      <div class="progress-dots" id="dotsEggs" aria-hidden="true"></div>
    </section>

    <!-- ============================= MILK ============================== -->
    <section class="screen" data-screen="MILK">
      <div class="prompt-bubble">
        <span class="prompt-icon" aria-hidden="true">🥛</span>
        <span class="prompt-icon prompt-icon--hold" aria-hidden="true">✋</span>
      </div>
      <div class="stage stage--milk">
        <div class="aria-portrait aria-portrait--stage" id="ariaMilk"></div>
        <button class="hold-target carton grounded-shadow" id="milkCarton" type="button" aria-label="Hold to pour milk">
          <span class="carton-emoji" aria-hidden="true">🥛</span>
          <span class="pour-stream" id="milkStream" aria-hidden="true"></span>
        </button>
        <div class="bowl-wrap grounded-shadow">
          <div class="bowl-slot" id="bowlMilkSlot"></div>
          <div class="fill-meter" aria-hidden="true">
            <div class="fill-meter-bar" id="milkFillBar"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================= STIR ============================== -->
    <section class="screen" data-screen="STIR">
      <div class="prompt-bubble">
        <span class="prompt-icon prompt-icon--swirl" aria-hidden="true">🥄</span>
        <span class="prompt-icon prompt-icon--swirl-arrow" aria-hidden="true">🔄</span>
      </div>
      <div class="stage stage--stir">
        <div class="aria-portrait aria-portrait--stage" id="ariaStir"></div>
        <div class="bowl-wrap bowl-wrap--big grounded-shadow" id="stirSurface">
          <div class="bowl-slot bowl-slot--big" id="bowlStirSlot"></div>
          <div class="swirl-trail" id="swirlTrail" aria-hidden="true"></div>
          <div class="swirl-spoon" id="swirlSpoon" aria-hidden="true">🥄</div>
        </div>
      </div>
      <div class="progress-dots" id="dotsStir" aria-hidden="true"></div>
    </section>

    <!-- ============================ BATTER ============================= -->
    <section class="screen" data-screen="BATTER">
      <div class="prompt-bubble">
        <span class="prompt-icon" aria-hidden="true">🥣</span>
        <span class="prompt-icon prompt-icon--hold" aria-hidden="true">✋</span>
      </div>
      <div class="stage stage--batter">
        <div class="aria-portrait aria-portrait--stage" id="ariaBatter"></div>
        <button class="hold-target ladle grounded-shadow" id="batterLadle" type="button" aria-label="Hold to pour batter onto the pan">
          <span class="ladle-emoji" aria-hidden="true">🥣</span>
          <span class="pour-stream pour-stream--vertical" id="batterStream" aria-hidden="true"></span>
        </button>
        <div class="pan-wrap grounded-shadow">
          <div class="pan-slot" id="panBatterSlot"></div>
          <div class="batter-pool" id="batterPool" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <!-- ============================= FLIP =============================== -->
    <section class="screen" data-screen="FLIP">
      <div class="prompt-bubble">
        <span class="prompt-icon prompt-icon--swipe" aria-hidden="true">⬆️</span>
        <span class="prompt-icon" aria-hidden="true">🥞</span>
      </div>
      <div class="stage stage--flip">
        <div class="aria-portrait aria-portrait--stage" id="ariaFlip"></div>
        <div class="pan-wrap grounded-shadow" id="flipPanWrap">
          <div class="pan-slot" id="panFlipSlot"></div>
        </div>
        <div class="swipe-hint" id="swipeHint" aria-hidden="true">⬆️</div>
      </div>
    </section>

    <!-- ========================== CELEBRATE ============================ -->
    <section class="screen" data-screen="CELEBRATE">
      <div class="celebrate-card">
        <div class="aria-portrait aria-portrait--celebrate" id="ariaCelebrate"></div>
        <div class="stack-slot" id="pancakeStackSlot"></div>
        <div class="confetti-field" id="confettiField" aria-hidden="true"></div>
        <button class="big-button big-button--again" id="playAgainButton" type="button" aria-label="Play again">
          <span class="big-button-icon" aria-hidden="true">🔁</span>
        </button>
      </div>
    </section>

  </div>

  <script src="assets.js"></script>
  <script src="audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
